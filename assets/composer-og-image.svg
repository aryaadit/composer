    <text x="0" y="70" fill="#722F37" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="400" letter-spacing="6" text-anchor="middle">COMPOSER</text>
    
    <!-- Tagline -->
    <text x="0" y="115" fill="#722F37" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" letter-spacing="2" text-anchor="middle" opacity="0.7">Curated date nights in NYC</text>
  </g>
</svg>
